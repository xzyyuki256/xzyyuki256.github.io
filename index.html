<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人主頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #ffffff; /* 底色：圖片變淡時會透出這個顏色 */
            color: #4a3728;
            position: relative;
            min-height: 100vh;
        }

        /* 背景濾鏡層 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            
            /* --- 本地背景圖片檔名 --- */
           background-image: url('jason-leung-TJ1RLAvxayQ-unsplash.jpg'); 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* 調整背景透明度 */
            opacity: 0.2; 
            
            /* 背景模糊 */
            filter: blur(5px);
        }

        .carrd-container {
            max-width: 450px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        /* 基礎卡片樣式 */
        .intro-card, .item-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .intro-card {
            border: 1px solid rgba(251, 211, 141, 0.5);
        }

        .item-card {
            border: 1px solid rgba(251, 211, 141, 0.5);
        }

        .item-card:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(251, 211, 141, 0.5);
            border-color: #ed8936;
        }

        .icon-box {
            background-color: #feebc8;
            color: #dd6b20;
        }
    </style>

</head>
<body class="min-h-screen flex items-center justify-center py-20">

    <div class="carrd-container text-center">
    
    <div class="intro-card mb-8 p-8 rounded-3xl text-left border-2 border-orange-200 shadow-lg">
        <div class="flex items-center mb-4">
            <img src="https://github.com/xzyyuki256.png" class="w-16 h-16 rounded-full border-2 border-orange-400 mr-4 shadow-sm" alt="Avatar">
            <div>
                <h1 class="text-2xl font-bold text-orange-900">2yy Toolbox</h1>
                <p class="text-xs text-orange-500 font-medium tracking-widest uppercase">By me</p>
            </div>
        </div>
        <p class="text-orange-800/80 text-sm leading-relaxed mb-4">
            這裏放我做的亂七八糟工具，如果剛好有人能用上就挺好啦。<br>
        </p>
        <p class="absolute bottom-3 right-4 text-[9px] text-orange-800/50 italic">
            *只有在自己用的機器上測試過，不保證品質良好
        </p>
        <div class="flex flex-wrap gap-3">
        <a href="https://github.com/xzyyuki256" target="_blank" class="flex items-center px-3 py-2 bg-orange-100/50 hover:bg-orange-200 text-orange-700 text-xs rounded-xl transition-all duration-300">
            <i class="fa-brands fa-github mr-2"></i> GitHub
        </a>
    </div>
    </div>
    

    <div class="flex items-center mb-4 px-2">
        <div class="h-[1px] flex-grow bg-orange-200"></div>
        <span class="mx-4 text-[10px] text-orange-400 font-bold tracking-widest uppercase">項目一覽</span>
        <div class="h-[1px] flex-grow bg-orange-200"></div>
    </div>

    <div id="project-list" class="space-y-4 text-left">
        </div>
    
    </div>
    
<script>
        // 從外部 JSON 檔案讀取專案資料
        async function loadProjects() {
            const container = document.getElementById('project-list');
            try {
                const response = await fetch('projects.json');
                if (!response.ok) throw new Error('無法讀取 JSON 檔案');
                const projects = await response.json();
                
                // 清空載入中文字
                container.innerHTML = '';

                // 循環生成卡片
                projects.forEach(project => {
                    const card = `
                        <a href="${project.link}" target="_blank" class="item-card block p-4 rounded-2xl flex items-center group">
                            <div class="w-12 h-12 icon-box rounded-xl flex items-center justify-center mr-4 shrink-0 transition-colors group-hover:bg-orange-500 group-hover:text-white">
                                <i class="${project.icon}"></i>
                            </div>
                            <div class="overflow-hidden">
                                <h3 class="font-bold text-sm text-orange-900">${project.title}</h3>
                                <p class="text-xs text-orange-700/60 truncate text-ellipsis">${project.description}</p>
                            </div>
                        </a>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = `<p class="text-center text-red-400 text-xs">專案載入失敗，請檢查 projects.json 是否存在。</p>`;
            }
        }

        // 執行載入
        loadProjects();
    </script>
</body>
</html>
