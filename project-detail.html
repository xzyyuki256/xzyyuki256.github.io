<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>項目詳情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #ffffff;
            color: #4a3728;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: url('jason-leung-TJ1RLAvxayQ-unsplash.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.15; 
            filter: blur(8px);
        }

        .content-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(251, 211, 141, 0.4);
        }
    </style>
</head>
<body class="min-h-screen py-12 px-6 flex justify-center">

    <div class="max-w-2xl w-full">
        <a href="index.html" class="inline-flex items-center text-orange-600 hover:text-orange-800 transition-colors mb-8 group">
            <i class="fa-solid fa-arrow-left mr-2 transition-transform group-hover:-translate-x-1"></i>
            <span class="text-sm font-medium">返回主頁</span>
        </a>

        <div class="content-card rounded-3xl p-8 shadow-xl">
            <div class="flex items-start justify-between mb-8">
                <div>
                    <h1 id="p-title" class="text-3xl font-bold text-orange-900 mb-2">載入中...</h1>
                    <div id="p-tags" class="flex gap-2">
                        </div>
                </div>
                <div class="w-16 h-16 bg-orange-100 rounded-2xl flex items-center justify-center text-orange-500 text-2xl">
                    <i id="p-icon" class="fa-solid fa-box"></i>
                </div>
            </div>

            <div class="aspect-video bg-orange-50 rounded-2xl mb-8 border border-orange-100 flex items-center justify-center overflow-hidden">
                <i class="fa-regular fa-image text-orange-200 text-4xl"></i>
            </div>

            <article class="prose prose-orange text-orange-800/80 leading-relaxed mb-10">
                <p id="p-full-desc">
                    正在獲取項目詳細資訊...
                </p>
            </article>

            <div class="flex items-center gap-3 mt-10 w-1/2 ml-auto">
                <a id="p-github" href="#" target="_blank" 
                class="w-10 h-10 flex items-center justify-center bg-white border border-orange-100 hover:border-orange-200 text-orange-700 rounded-lg transition-all shadow-sm group shrink-0"
                title="查看源碼">
                    <i class="fa-brands fa-github text-lg transition-transform group-hover:scale-110"></i>
                </a>

                <a id="p-download" href="#" target="_blank" 
                class="flex-grow flex items-center justify-center h-10 bg-orange-500 hover:bg-orange-600 text-white rounded-lg text-xs font-bold transition-all shadow-md shadow-orange-100">
                    <i class="fa-solid fa-download mr-1.5"></i> 下載
                </a>
            </div>
        </div>

        <p class="mt-8 text-center text-[10px] text-orange-400/60 tracking-widest uppercase">
            Provided by xzyyuki256
        </p>
    </div>

    <script>
        // 根據 URL 參數讀取 JSON 裡的詳細內容，例如：project-detail.html?id=0
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        async function fetchDetail() {
            try {
                const response = await fetch('projects.json');
                const data = await response.json();
                const project = data[projectId];

                if (project) {
                    document.getElementById('p-title').innerText = project.title;
                    document.getElementById('p-full-desc').innerText = project.longDescription || project.description;
                    document.getElementById('p-icon').className = project.icon;
                    document.getElementById('p-github').href = project.link;
                    document.getElementById('p-download').href = project.downloadUrl || '#';
                
                    const screenshotContainer = document.querySelector('.aspect-video');
                    if (project.screenshot) {
                        // 如果有圖片，就把原本的圖標換成真正的 img 標籤
                        screenshotContainer.innerHTML = `<img src="${project.screenshot}" class="w-full h-full object-cover" alt="${project.title}">`;
                    } 
                    else {
                        // 如果沒有圖片，保持顯示一個佔位圖標
                        screenshotContainer.innerHTML = `<i class="fa-regular fa-image text-orange-200 text-4xl"></i>`;
                    }
                }
            } catch (e) {
                console.error("加載失敗");
            }
        }
        fetchDetail();
    </script>
</body>
</html>
